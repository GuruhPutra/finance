<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/finance/manifest.json" />

    <!-- Theme & App Colors -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="background-color" content="#0d0d14" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FinanceOS" />
    <link rel="apple-touch-icon" href="/finance/icon-512.png" />

    <!-- GitHub Pages SPA: restore URL dari redirect 404.html -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();

      // Tangkap query string dari 404.html redirect
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) +
            decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          );
        }
      }(window.location));
    </script>

    <!-- SEO -->
    <title>FinanceOS – Smart Personal Finance Manager</title>
    <meta name="description" content="Kelola keuangan pribadi Anda dengan cerdas. Lacak transaksi, atur anggaran, dan pantau saldo semua akun dalam satu tempat." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/finance/favicon.svg" />
    <script type="module" crossorigin src="/finance/assets/index-B2RMWwOw.js"></script>
    <link rel="stylesheet" crossorigin href="/finance/assets/index-BEdKHnhZ.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/finance/sw.js')
            .then(reg => console.log('[SW] Registered:', reg.scope))
            .catch(err => console.warn('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
