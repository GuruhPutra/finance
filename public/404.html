<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>FinanceOS</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Ketika GitHub Pages return 404 (karena path tidak ada sebagai file),
      // halaman ini menangkap URL dan meng-encode path ke query string,
      // lalu redirect ke index.html agar React Router bisa menghandle-nya.
      var segmentCount = 1; // jumlah segmen base path: /finance/ = 1

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname +
        (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.split('/').slice(1 + segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
